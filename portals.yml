# ============================================================
#  Title filter — at least one positive AND zero negatives
# ============================================================

title_filter:
  positive:
    # -- ML / AI Engineering --
    - "Machine Learning"
    - "ML Engineer"
    - "ML Ops"
    - "MLOps"
    - "Applied ML"
    - "Applied AI"
    - "AI Engineer"
    - "AI/ML"
    - "AIML"
    - "Model Engineer"
    - "Deep Learning"
    # -- NLP / LLM / Generative --
    - "NLP"
    - "Natural Language"
    - "LLM"
    - "Generative AI"
    - "GenAI"
    - "Foundation Model"
    - "Language Model"
    - "Agentic"
    - "Agent Engineer"
    - "AI Agent"
    # -- Computer Vision / Robotics / Edge --
    - "Computer Vision"
    - "CV Engineer"
    - "Vision Engineer"
    - "Edge AI"
    - "Edge ML"
    - "Embedded ML"
    - "Robotics"
    - "Perception"
    # -- Data Science / Research --
    - "Data Scientist"
    - "Data Science"
    - "Research Engineer"
    - "Research Scientist"     # capped at 3.0/5 by modes/_profile.md Override 1
    - "Applied Scientist"      # also capped at 3.0/5
  negative:
    # -- Hard seniority floor (true entry-level only) --
    # Updated 2026-05-31: opened up Junior/Associate/Engineer-I tier per Dan's
    # expanded search. The 4.0/5 eval threshold + Override 1/2/3 caps in
    # modes/_profile.md are now the primary calibration; the scan-time filter
    # only blocks postings that are categorically not for someone with 7yr
    # experience (internships and explicit new-grad pipelines).
    #
    # SAME-ROLE / MULTI-LEVEL CAVEAT:
    # Big orgs (Stripe, Cohere, Anthropic, etc.) often post the SAME team's slot
    # at multiple seniority levels (ML Engineer + Senior ML Engineer + Staff ML
    # Engineer). Without deduplication, scan.mjs will collect all three, then
    # process-pipeline will burn LLM tokens producing 3 near-identical evals,
    # then the bot will post each one separately. See task #15 (Cluster same-
    # role multi-level postings) for the implementation plan. Until that lands,
    # expect occasional sibling-posting noise in #job-alerts.
    - "Intern"
    - "Internship"
    - "Apprentice"
    - "New Grad"
    # -- Wrong function --
    - "Recruiter"
    - "Recruiting"
    - "Sales"
    - "Account Executive"
    - "Account Manager"
    - "Customer Success"
    - "Customer Support"
    - "Marketing"
    - "BDR"
    - "SDR"
    - "Designer"
    # -- Tech stacks Dan doesn't want --
    - ".NET"
    - "iOS"
    - "Android"
    - "PHP"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Blockchain"
    - "Web3"
    - "Crypto"
  seniority_boost:
    # Soft preference, not required. Updated 2026-05-31: dropped Staff and
    # Principal — those are above Dan's current target ceiling (Senior IC).
    # Lead kept because Lead-IC hybrid is fine; Lead-with-direct-reports
    # is handled by the Org-Leadership Cap in modes/_profile.md Override 3.
    - "Senior"
    - "Lead"


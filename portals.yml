# Portal Scanner Configuration — Daniel Garcia
# Used by `scan.mjs` (zero-token portal scan) to populate data/pipeline.md.
#
# How this file is read:
#   - `location_filter` and `title_filter` gate every candidate job before it's added
#   - `tracked_companies` lists the ATS endpoints to scan; one entry per company
#   - `scan.mjs` only handles Greenhouse / Ashby / Lever providers — companies on
#     other platforms (Workable, Workday, BambooHR, etc.) get skipped silently
#     until we add a Playwright-backed pipeline processor in Phase 5 (Discord)
#
# To preview without writing files:  node scan.mjs --dry-run
# To scan a single company:           node scan.mjs --company "Anthropic"

# ============================================================
#  Location filter — applied AFTER title filter, BEFORE dedup
# ============================================================
# Matches `location` string on each job (case-insensitive substring).
# - Block list takes precedence over allow list
# - Empty location strings always pass (don't penalize missing data)
# - Allow list lets remote + US tri-state metros through

location_filter:
  allow:
    - "Remote"
    - "United States"
    - "USA"
    - "U.S."
    - "U.S. Remote"
    - "Anywhere"
    - "New York"
    - "NY"
    - "NYC"
    - "Brooklyn"
    - "Manhattan"
    - "Pittsburgh"
    - "PA"
    - "Pennsylvania"
    - "New Jersey"
    - "NJ"
    - "Jersey City"
  block:

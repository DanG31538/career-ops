# career-ops Docker Compose
# ------------------------------------------------------------
# Single service running the Discord bot as the main process.
# Outbound-only — no web ports exposed. Restart policy keeps the
# container running across droplet reboots.
#
# Standard ops:
#   docker compose build        # build the image
#   docker compose up -d        # start in background
#   docker compose down         # stop + remove
#   docker compose logs -f      # tail bot logs
#   docker compose exec career-ops node scan.mjs
#   docker compose exec career-ops node llm-eval.mjs --file jds/test-1.txt
#   docker compose exec career-ops node process-pipeline.mjs --dry-run
# ------------------------------------------------------------

services:
  career-ops:
    build: .
    container_name: career-ops
    restart: unless-stopped

    # Long-running process: the Discord bot. Phase 5b.2 swapped this
    # from the Dockerfile's `tail -f /dev/null` placeholder. To drop
    # back to the placeholder for debugging via `exec`, comment out
    # this `command:` and `docker compose up -d --force-recreate`.
    command: ["node", "discord-bot.mjs"]

    # Match host timezone for shell `date` and any TZ-aware logging.
    # Note: JS `new Date().toISOString()` is always UTC regardless of TZ
    # env var — if local-date semantics matter for closure detection,
    # we'll revisit.
    environment:
      - TZ=America/New_York

    volumes:
      # -- Operational data (persist across rebuilds; written every run) --
      - ./data:/app/data
      - ./reports:/app/reports
      - ./output:/app/output
      - ./batch/logs:/app/batch/logs
      - ./batch/tracker-additions:/app/batch/tracker-additions

      # -- Test fixtures + manual JD pastes --
      - ./jds:/app/jds

      # -- Config files (editable from host without rebuilding the image) --
      - ./cv.md:/app/cv.md
      - ./config:/app/config
      - ./modes:/app/modes
      - ./portals.yml:/app/portals.yml

      # -- Obsidian vault (Phase 6 — application tracking) --
      # Bot writes .md notes here on ✅/❌ decisions. Syncthing on the host
      # replicates this folder to Dan's desktop/laptop. The container only
      # needs write access to the applications/ subdir; broader vault access
      # is fine since Syncthing handles two-way sync.
      # Comment out if OBSIDIAN_VAULT_PATH is unset in .env (no-op anyway,
      # but cleaner not to mount a directory we'll never read).
      - ~/obsidian-vault/job-search:/app/obsidian-vault/job-search

      # -- Secrets (read-only — container shouldn't be able to write to .env) --
      - ./.env:/app/.env:ro
